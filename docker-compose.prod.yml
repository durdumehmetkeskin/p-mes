# Production stack for quanta-mes.durdumehmetkeskin.space.
#
#   docker compose -p quanta-mes -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Design:
#   - db / minio / pgadmin publish NO host ports — they are reachable only on
#     the compose network (backend streams MinIO objects itself; pgAdmin is
#     reached with `docker compose ... exec` or a temporary SSH tunnel).
#   - backend + frontend bind to LOOPBACK ports only; the host nginx terminates
#     TLS and proxies the two public domains onto them (see deploy/nginx/).
#   - No Traefik: routing/TLS is the host nginx's job on this server.
#   - Host ports 3020/3021 were chosen to avoid the ports already in use on
#     the server (8090, 3010, 5432, 3000, 1337, 9000, 9001, 6379).

name: quanta-mes

services:
  db:
    image: postgres:18-alpine
    container_name: quanta-mes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:?set in .env.prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${DB_NAME:-p_mes}
    # No ports: database is reachable only from the docker network.
    volumes:
      # postgres:18 images moved the data dir to /var/lib/postgresql (mounting
      # the old .../data path makes the container crash-loop on fresh pulls).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quanta-mes-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?set in .env.prod}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?set in .env.prod}
    # No ports: docker-network only. To use it temporarily from your machine:
    #   ssh -L 5050:127.0.0.1:5050 <server>  +  docker run a socat sidecar, or
    #   temporarily add "127.0.0.1:5050:80" here and `up -d pgadmin`.
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  minio:
    image: minio/minio:latest
    container_name: quanta-mes-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set in .env.prod}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set in .env.prod}
    # No ports: only the backend talks to MinIO (downloads are streamed
    # through the API, presigned URLs are not used).
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: quanta-mes-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-p-mes}
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-p_mes}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://quanta-mes.durdumehmetkeskin.space}
      # Public SPA base URL baked into QR-code deep links.
      APP_URL: ${APP_URL:-https://quanta-mes.durdumehmetkeskin.space}
      # Seeded on startup by the entrypoint (idempotent).
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set in .env.prod}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set in .env.prod}
    ports:
      # Loopback only — nginx (quanta-mes-api.durdumehmetkeskin.space) proxies here.
      - '127.0.0.1:${BACKEND_HOST_PORT:-3020}:3000'

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time — the SPA calls the API domain.
        VITE_API_URL: ${VITE_API_URL:-https://quanta-mes-api.durdumehmetkeskin.space/api}
    container_name: quanta-mes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Loopback only — nginx (quanta-mes.durdumehmetkeskin.space) proxies here.
      - '127.0.0.1:${FRONTEND_HOST_PORT:-3021}:3000'

volumes:
  pgdata:
  pgadmin:
  miniodata:
