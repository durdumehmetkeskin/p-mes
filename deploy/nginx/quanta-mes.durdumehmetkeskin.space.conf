# QUA-MES frontend (SPA) — proxies to the frontend container (loopback :3021).
#
# TLS terminates at CLOUDFLARE (proxied/orange-cloud); the origin serves plain
# HTTP on :80 (SSL mode "Flexible"). For "Full (strict)", install a Cloudflare
# Origin Certificate and enable the commented 443 block at the bottom.

server {
    listen 80;
    listen [::]:80;
    server_name quanta-mes.durdumehmetkeskin.space;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Behind Cloudflare the effective scheme is https at the edge.
        proxy_set_header X-Forwarded-Proto https;
    }
}

