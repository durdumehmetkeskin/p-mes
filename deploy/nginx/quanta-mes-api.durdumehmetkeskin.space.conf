# QUA-MES API — proxies to the backend container (loopback :3020).
#
# TLS terminates at CLOUDFLARE (the domain is proxied/orange-cloud); the
# origin serves plain HTTP on :80 (Cloudflare SSL mode "Flexible"). For
# "Full (strict)", install a Cloudflare Origin Certificate and enable the
# commented 443 block at the bottom.

server {
    listen 80;
    listen [::]:80;
    server_name quanta-mes-api.durdumehmetkeskin.space;

    # Attachment/XLS uploads go up to 50 MB (backend multer limit) + overhead.
    client_max_body_size 60m;

    # Report rendering (Chromium PDF) can take a while.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Basic API rate limit (zone defined in quanta-mes-ratelimit.conf).
    location / {
        limit_req zone=quanta_mes_api burst=100 nodelay;
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Behind Cloudflare the effective scheme is https at the edge.
        proxy_set_header X-Forwarded-Proto https;
    }
}

